<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gathering</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
    --text: #c9d1d9; --text2: #8b949e; --accent: #58a6ff; --accent2: #1f6feb;
    --green: #3fb950; --red: #f85149; --orange: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
         background: var(--bg); color: var(--text); height: 100vh; display: flex; }

  /* ── Auth screen ─── */
  #auth-screen { display: flex; align-items: center; justify-content: center;
                  width: 100%; height: 100%; }
  .auth-box { background: var(--bg2); border: 1px solid var(--border);
              border-radius: 8px; padding: 2rem; width: 340px; }
  .auth-box h1 { font-size: 1.4rem; margin-bottom: 0.3rem; color: var(--accent); }
  .auth-box p { font-size: 0.8rem; color: var(--text2); margin-bottom: 1.5rem; }
  .auth-box input { width: 100%; padding: 0.5rem 0.7rem; margin-bottom: 0.7rem;
                    background: var(--bg); border: 1px solid var(--border);
                    border-radius: 4px; color: var(--text); font-family: inherit;
                    font-size: 0.85rem; }
  .auth-box input:focus { outline: none; border-color: var(--accent); }
  .auth-buttons { display: flex; gap: 0.5rem; }
  .auth-buttons button { flex: 1; padding: 0.5rem; border: none; border-radius: 4px;
                         font-family: inherit; font-size: 0.85rem; cursor: pointer; }
  .btn-primary { background: var(--accent2); color: #fff; }
  .btn-secondary { background: var(--bg3); color: var(--text); }
  .btn-primary:hover { background: var(--accent); }
  .btn-secondary:hover { background: var(--border); }
  .auth-error { color: var(--red); font-size: 0.8rem; margin-bottom: 0.5rem;
                min-height: 1.2rem; }

  /* ── Chat layout ─── */
  #chat-screen { display: none; width: 100%; height: 100%; }
  .layout { display: flex; height: 100%; width: 100%; }

  /* Sidebar */
  .sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--border);
             display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 1rem; border-bottom: 1px solid var(--border);
                     display: flex; align-items: center; justify-content: space-between; }
  .sidebar-header-left h2 { font-size: 1rem; color: var(--accent); }
  .sidebar-header-left .user-info { font-size: 0.75rem; color: var(--text2); margin-top: 0.3rem; }
  .admin-btn { background: none; border: 1px solid var(--border); border-radius: 4px;
               color: var(--text2); cursor: pointer; padding: 0.3rem 0.4rem; font-size: 0.85rem;
               line-height: 1; }
  .admin-btn:hover { color: var(--accent); border-color: var(--accent); }
  .sidebar-section { padding: 0.5rem 0; }
  .sidebar-section h3 { font-size: 0.7rem; text-transform: uppercase; color: var(--text2);
                        padding: 0.3rem 1rem; letter-spacing: 0.05em; }
  .channel-item { padding: 0.35rem 1rem; font-size: 0.85rem; cursor: pointer;
                  display: flex; justify-content: space-between; align-items: center; }
  .channel-item:hover { background: var(--bg3); }
  .channel-item.active { background: var(--bg3); color: var(--accent); }
  .channel-item .count { font-size: 0.7rem; color: var(--text2); }
  .user-item { padding: 0.25rem 1rem; font-size: 0.8rem; color: var(--text2); }
  .user-item::before { content: '\25CF'; color: var(--green); margin-right: 0.4rem;
                       font-size: 0.6rem; }
  .join-channel { padding: 0.5rem 1rem; }
  .join-channel input { width: 100%; padding: 0.3rem 0.5rem; background: var(--bg);
                       border: 1px solid var(--border); border-radius: 3px;
                       color: var(--text); font-family: inherit; font-size: 0.8rem; }
  .join-channel input:focus { outline: none; border-color: var(--accent); }

  .sidebar-bottom { margin-top: auto; padding: 0.7rem 1rem; border-top: 1px solid var(--border);
                   font-size: 0.7rem; color: var(--text2); }

  /* Main chat area */
  .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-header { padding: 0.7rem 1rem; border-bottom: 1px solid var(--border);
                 display: flex; align-items: center; gap: 0.5rem; }
  .chat-header h2 { font-size: 0.95rem; }
  .chat-header .typing { font-size: 0.75rem; color: var(--text2); font-style: italic; }

  .messages { flex: 1; overflow-y: auto; padding: 0.5rem 1rem; display: flex;
              flex-direction: column; gap: 0.15rem; }
  .msg { padding: 0.3rem 0; line-height: 1.4; position: relative; }
  .msg .meta { font-size: 0.75rem; }
  .msg .author { color: var(--accent); font-weight: 600; }
  .msg .time { color: var(--text2); margin-left: 0.4rem; font-size: 0.7rem; }
  .msg .ttl { color: var(--orange); margin-left: 0.3rem; font-size: 0.65rem; }
  .msg .edited { color: var(--text2); font-size: 0.65rem; margin-left: 0.3rem; }
  .msg .body { margin-top: 0.1rem; font-size: 0.85rem; word-wrap: break-word; }
  .msg.system { color: var(--text2); font-style: italic; font-size: 0.8rem; }

  /* Message hover actions */
  .msg-actions { display: none; position: absolute; top: 0; right: 0; gap: 0.2rem;
                 background: var(--bg2); border: 1px solid var(--border); border-radius: 4px;
                 padding: 0.15rem; z-index: 10; }
  .msg:hover .msg-actions { display: flex; }
  .msg-actions button { background: none; border: none; color: var(--text2); cursor: pointer;
                        font-size: 0.75rem; padding: 0.15rem 0.3rem; border-radius: 3px;
                        font-family: inherit; }
  .msg-actions button:hover { background: var(--bg3); color: var(--text); }
  .msg-actions button.del-btn:hover { color: var(--red); }

  /* Edit banner */
  .edit-banner { display: none; padding: 0.3rem 0.7rem; background: var(--bg3);
                 border-bottom: 1px solid var(--accent2); font-size: 0.75rem;
                 color: var(--text2); align-items: center; justify-content: space-between; }
  .edit-banner.active { display: flex; }
  .edit-banner button { background: none; border: none; color: var(--accent); cursor: pointer;
                        font-family: inherit; font-size: 0.75rem; }

  /* Rich content styles */
  .msg .body strong { color: #e6edf3; }
  .msg .body em { color: var(--text); }
  .msg .body del { color: var(--text2); }
  .msg .body code { background: var(--bg3); padding: 0.1rem 0.3rem; border-radius: 3px;
                    font-size: 0.82rem; }
  .msg .body pre { background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
                   padding: 0.5rem 0.7rem; margin: 0.3rem 0; overflow-x: auto; position: relative; }
  .msg .body pre code { background: none; padding: 0; font-size: 0.82rem; }
  .msg .body pre .lang-tag { position: absolute; top: 2px; right: 6px; font-size: 0.65rem;
                             color: var(--text2); }
  .msg .body blockquote { border-left: 3px solid var(--accent2); padding-left: 0.7rem;
                          color: var(--text2); margin: 0.2rem 0; }
  .msg .body ul, .msg .body ol { padding-left: 1.5rem; margin: 0.2rem 0; }
  .msg .body a { color: var(--accent); text-decoration: none; }
  .msg .body a:hover { text-decoration: underline; }
  .msg .body .katex { font-size: 1.4rem; }
  .msg .body .katex-display { margin: 0.3rem 0; overflow-x: auto; }
  .msg .body .katex-display .katex { font-size: 2rem; }

  /* Syntax highlighting */
  .msg .body pre .kw { color: #ff7b72; }
  .msg .body pre .str { color: #a5d6ff; }
  .msg .body pre .cm { color: #8b949e; font-style: italic; }
  .msg .body pre .num { color: #79c0ff; }
  .msg .body pre .fn { color: #d2a8ff; }
  .msg .body pre .op { color: #ff7b72; }

  /* File attachments */
  .msg .attachments { margin-top: 0.3rem; }
  .msg .attachment { display: inline-flex; align-items: center; gap: 0.4rem;
                     background: var(--bg3); border: 1px solid var(--border);
                     border-radius: 4px; padding: 0.3rem 0.6rem; margin: 0.2rem 0.3rem 0.2rem 0;
                     font-size: 0.8rem; }
  .msg .attachment a { color: var(--accent); text-decoration: none; }
  .msg .attachment a:hover { text-decoration: underline; }
  .msg .attachment .file-size { color: var(--text2); font-size: 0.7rem; }
  .msg .attachment-img { max-width: 400px; max-height: 300px; border-radius: 4px;
                         margin-top: 0.3rem; cursor: pointer; display: block; }
  .msg .attachment-img:hover { opacity: 0.9; }
  .msg .attachment-audio { margin-top: 0.3rem; display: block; }
  .msg .attachment-audio audio { max-width: 400px; height: 36px; border-radius: 4px; }
  .msg .attachment-audio .file-name { font-size: 0.75rem; color: var(--text2); margin-bottom: 0.2rem; }

  .input-area { padding: 0.7rem 1rem; border-top: 1px solid var(--border); }
  .input-row { display: flex; gap: 0.5rem; align-items: flex-end; }
  .input-area textarea { flex: 1; resize: none; padding: 0.5rem 0.7rem;
                        background: var(--bg2); border: 1px solid var(--border);
                        border-radius: 6px; color: var(--text); font-family: inherit;
                        font-size: 0.85rem; max-height: 120px; min-height: 38px;
                        line-height: 1.4; }
  .input-area textarea:focus { outline: none; border-color: var(--accent); }
  .ttl-control { display: flex; align-items: center; gap: 0.3rem; }
  .ttl-control label { font-size: 0.7rem; color: var(--text2); white-space: nowrap; }
  .ttl-control select { background: var(--bg2); border: 1px solid var(--border);
                       color: var(--text); font-family: inherit; font-size: 0.75rem;
                       padding: 0.2rem; border-radius: 3px; }
  .send-btn { padding: 0.5rem 1rem; background: var(--accent2); color: #fff; border: none;
              border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.85rem; }
  .send-btn:hover { background: var(--accent); }
  .attach-btn { padding: 0.5rem; background: var(--bg3); color: var(--text2); border: 1px solid var(--border);
                border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 1rem;
                line-height: 1; display: flex; align-items: center; justify-content: center; }
  .attach-btn:hover { color: var(--accent); border-color: var(--accent); }
  .pending-files { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.3rem; }
  .pending-file { display: inline-flex; align-items: center; gap: 0.3rem;
                  background: var(--bg3); border: 1px solid var(--border);
                  border-radius: 3px; padding: 0.15rem 0.4rem; font-size: 0.75rem; }
  .pending-file .remove-file { cursor: pointer; color: var(--red); margin-left: 0.2rem; }
  .upload-progress { font-size: 0.7rem; color: var(--text2); margin-top: 0.2rem; }

  /* ── Voice section ─── */
  .voice-section { border-top: 1px solid var(--border); padding: 0.5rem 0; }
  .voice-section h3 { font-size: 0.7rem; text-transform: uppercase; color: var(--text2);
                      padding: 0.3rem 1rem; letter-spacing: 0.05em; }
  .voice-status { padding: 0.2rem 1rem; font-size: 0.75rem; color: var(--text2); }
  .voice-member { padding: 0.2rem 1rem; font-size: 0.8rem; color: var(--text2);
                  display: flex; align-items: center; gap: 0.4rem; }
  .voice-member .voice-dot { width: 8px; height: 8px; border-radius: 50%;
                             background: var(--text2); display: inline-block; flex-shrink: 0; }
  .voice-member.speaking .voice-dot { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .voice-member.muted .voice-name { color: var(--text2); opacity: 0.6; }
  .voice-member.muted .voice-dot { background: var(--red); }
  .voice-btn { margin: 0.4rem 1rem; padding: 0.35rem 0.6rem; border: none; border-radius: 4px;
               font-family: inherit; font-size: 0.75rem; cursor: pointer; }
  .voice-join { background: var(--green); color: #000; }
  .voice-join:hover { opacity: 0.85; }
  .voice-leave { background: var(--red); color: #fff; }
  .voice-leave:hover { opacity: 0.85; }
  .voice-controls { display: flex; gap: 0.3rem; padding: 0.2rem 1rem; }
  .voice-controls button { padding: 0.25rem 0.5rem; border: 1px solid var(--border);
                          border-radius: 4px; background: var(--bg3); color: var(--text);
                          font-family: inherit; font-size: 0.7rem; cursor: pointer; }
  .voice-controls button.active { background: var(--red); color: #fff; border-color: var(--red); }
  .voice-controls button:hover { border-color: var(--accent); }

  /* ── Topics ─── */
  .view-toggle { display: flex; gap: 0; margin-left: auto; }
  .view-toggle button { padding: 0.3rem 0.7rem; background: var(--bg); border: 1px solid var(--border);
                         color: var(--text2); font-family: inherit; font-size: 0.75rem; cursor: pointer; }
  .view-toggle button:first-child { border-radius: 4px 0 0 4px; }
  .view-toggle button:last-child { border-radius: 0 4px 4px 0; }
  .view-toggle button.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }
  #chat-view { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #topics-view { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #thread-view { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .topic-list { flex: 1; overflow-y: auto; padding: 0.5rem 1rem; }
  .topic-item { padding: 0.6rem 0.8rem; border: 1px solid var(--border); border-radius: 6px;
                margin-bottom: 0.5rem; cursor: pointer; background: var(--bg2); }
  .topic-item:hover { border-color: var(--accent); }
  .topic-item.pinned { border-left: 3px solid var(--orange); }
  .topic-title { font-size: 0.9rem; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 0.4rem; }
  .topic-pin-icon { color: var(--orange); font-size: 0.75rem; }
  .topic-meta { font-size: 0.7rem; color: var(--text2); margin-top: 0.2rem; }
  .topic-stats { font-size: 0.7rem; color: var(--text2); margin-top: 0.15rem; }
  .new-topic-form { padding: 0.7rem 1rem; border-top: 1px solid var(--border); }
  .new-topic-form input { width: 100%; padding: 0.4rem 0.6rem; margin-bottom: 0.4rem;
                           background: var(--bg2); border: 1px solid var(--border);
                           border-radius: 4px; color: var(--text); font-family: inherit; font-size: 0.85rem; }
  .new-topic-form input:focus { outline: none; border-color: var(--accent); }
  .new-topic-form textarea { width: 100%; padding: 0.4rem 0.6rem; min-height: 60px; resize: vertical;
                              background: var(--bg2); border: 1px solid var(--border);
                              border-radius: 4px; color: var(--text); font-family: inherit; font-size: 0.85rem; }
  .new-topic-form textarea:focus { outline: none; border-color: var(--accent); }
  .thread-header { padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); }
  .thread-back { cursor: pointer; color: var(--accent); font-size: 0.8rem; margin-bottom: 0.3rem; }
  .thread-back:hover { text-decoration: underline; }
  .thread-title-row { display: flex; align-items: center; gap: 0.5rem; }
  .thread-title { font-size: 1rem; font-weight: 600; }
  .thread-pin-btn { padding: 0.2rem 0.5rem; background: var(--bg3); border: 1px solid var(--border);
                    border-radius: 4px; color: var(--text2); font-family: inherit; font-size: 0.7rem; cursor: pointer; }
  .thread-pin-btn:hover { border-color: var(--accent); }
  .thread-body { padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); }
  .thread-body .body { font-size: 0.85rem; line-height: 1.5; }
  .thread-body .meta { font-size: 0.75rem; color: var(--text2); margin-bottom: 0.3rem; }
  .thread-replies { flex: 1; overflow-y: auto; padding: 0.5rem 1rem; }
  .topic-empty { color: var(--text2); font-size: 0.85rem; padding: 2rem; text-align: center; }

  /* ── Admin panel overlay ─── */
  .admin-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                   background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
  .admin-overlay.active { display: flex; }
  .admin-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
                 width: 550px; max-height: 80vh; display: flex; flex-direction: column; }
  .admin-panel-header { padding: 1rem; border-bottom: 1px solid var(--border);
                        display: flex; justify-content: space-between; align-items: center; }
  .admin-panel-header h2 { font-size: 1rem; color: var(--accent); }
  .admin-panel-close { background: none; border: none; color: var(--text2); cursor: pointer;
                       font-size: 1.2rem; }
  .admin-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .admin-tabs button { flex: 1; padding: 0.5rem; background: none; border: none; color: var(--text2);
                       font-family: inherit; font-size: 0.8rem; cursor: pointer;
                       border-bottom: 2px solid transparent; }
  .admin-tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }
  .admin-tab-content { flex: 1; overflow-y: auto; padding: 1rem; }
  .admin-field { margin-bottom: 1rem; }
  .admin-field label { display: block; font-size: 0.75rem; color: var(--text2); margin-bottom: 0.3rem; }
  .admin-field select, .admin-field input { width: 100%; padding: 0.4rem 0.6rem;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: inherit; font-size: 0.8rem; }
  .admin-field select:focus, .admin-field input:focus { outline: none; border-color: var(--accent); }
  .invite-code-display { background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
                         padding: 0.5rem 0.7rem; font-size: 0.9rem; color: var(--green);
                         display: flex; align-items: center; justify-content: space-between;
                         margin-bottom: 0.5rem; }
  .invite-code-display button { background: var(--bg3); border: 1px solid var(--border);
                                border-radius: 3px; color: var(--text); cursor: pointer;
                                padding: 0.2rem 0.5rem; font-family: inherit; font-size: 0.7rem; }
  .invite-list-item { padding: 0.4rem 0; border-bottom: 1px solid var(--border);
                      font-size: 0.8rem; display: flex; justify-content: space-between; }
  .invite-list-item .invite-status { font-size: 0.7rem; }
  .invite-list-item .invite-status.used { color: var(--text2); }
  .invite-list-item .invite-status.unused { color: var(--green); }
  .role-item { padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px;
               margin-bottom: 0.5rem; background: var(--bg); }
  .role-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
  .role-item-name { font-weight: 600; font-size: 0.85rem; }
  .role-item-perms { font-size: 0.7rem; color: var(--text2); }
  .admin-btn-sm { padding: 0.3rem 0.6rem; background: var(--accent2); color: #fff; border: none;
                  border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.75rem; }
  .admin-btn-sm:hover { background: var(--accent); }
  .admin-btn-sm.danger { background: var(--red); }
  .admin-btn-sm.danger:hover { opacity: 0.85; }
  .admin-user-role { display: flex; gap: 0.5rem; margin-top: 0.5rem; align-items: flex-end; }
  .admin-user-role input, .admin-user-role select { flex: 1; }
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>&#x2381; Gathering</h1>
    <p>self-hosted &middot; encrypted &middot; ephemeral</p>
    <div class="auth-error" id="auth-error"></div>
    <input type="text" id="username" placeholder="username" autocomplete="username">
    <input type="password" id="password" placeholder="password" autocomplete="current-password">
    <input type="text" id="invite-code" placeholder="invite code" style="display:none">
    <div class="auth-buttons">
      <button class="btn-primary" onclick="doLogin()">Login</button>
      <button class="btn-secondary" id="register-btn" onclick="doRegister()">Register</button>
    </div>
  </div>
</div>

<!-- Chat Screen -->
<div id="chat-screen">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-header-left">
          <h2>&#x2381; Gathering</h2>
          <div class="user-info">logged in as <strong id="display-user"></strong></div>
        </div>
        <button class="admin-btn" id="admin-gear-btn" style="display:none" onclick="openAdminPanel()" title="Admin">&#x2699;</button>
      </div>
      <div class="sidebar-section">
        <h3>Channels</h3>
        <div id="channel-list"></div>
        <div class="join-channel">
          <input type="text" id="new-channel" placeholder="join or create #channel"
                 onkeydown="if(event.key==='Enter')joinChannel()">
        </div>
      </div>
      <div class="sidebar-section">
        <h3>Online</h3>
        <div id="online-users"></div>
      </div>
      <div class="voice-section">
        <h3>Voice</h3>
        <div class="voice-status" id="voice-status">Not connected</div>
        <div id="voice-members"></div>
        <div class="voice-controls" id="voice-controls" style="display:none;">
          <button id="mute-btn" onclick="toggleMute()">Mute</button>
          <button id="deafen-btn" onclick="toggleDeafen()">Deafen</button>
        </div>
        <button class="voice-btn voice-join" id="voice-join-btn" onclick="joinVoice()">Join Voice</button>
        <button class="voice-btn voice-leave" id="voice-leave-btn" onclick="leaveVoice()" style="display:none;">Leave Voice</button>
      </div>
      <div class="sidebar-bottom">
        Messages are encrypted in transit.<br>
        Set TTL to auto-delete messages.
      </div>
    </div>
    <div class="chat-main">
      <div class="chat-header">
        <h2 id="chat-channel-name">#general</h2>
        <span class="typing" id="typing-indicator"></span>
        <div class="view-toggle">
          <button id="view-chat-btn" class="active" onclick="switchView('chat')">Chat</button>
          <button id="view-topics-btn" onclick="switchView('topics')">Topics</button>
        </div>
      </div>

<script>
// ── State ───────────────────────────────────────────────────────────
let ws = null;
let token = localStorage.getItem('gathering_token');
let currentUser = '';
let currentChannel = 'general';
let channels = [];
let typingTimers = {};
let pendingAttachments = []; // {id, filename, size}
let userRoles = [];
let isAdmin = false;
let editingMessageId = null;

// ── Auth ────────────────────────────────────────────────────────────
async function checkServerInfo() {
  try {
    const res = await fetch('/api/server-info');
    const data = await res.json();
    const regMode = data.registration_mode || 'open';
    const regBtn = document.getElementById('register-btn');
    const inviteInput = document.getElementById('invite-code');
    if (regMode === 'closed') {
      regBtn.style.display = 'none';
      inviteInput.style.display = 'none';
    } else if (regMode === 'invite') {
      regBtn.style.display = '';
      inviteInput.style.display = '';
    } else {
      regBtn.style.display = '';
      inviteInput.style.display = 'none';
    }
  } catch (e) {}
}
checkServerInfo();

async function doAuth(endpoint) {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';

  if (!username || !password) { errEl.textContent = 'Fill in both fields'; return; }

  const body = { username, password };
  const inviteCode = document.getElementById('invite-code').value.trim();
  if (inviteCode && endpoint === 'register') {
    body.invite_code = inviteCode;
  }

  try {
    const res = await fetch(`/api/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data.ok && data.token) {
      token = data.token;
      localStorage.setItem('gathering_token', token);
      connectWS();
    } else {
      errEl.textContent = data.error || 'Auth failed';
    }
  } catch (e) {
    errEl.textContent = 'Connection error';
  }
}
function doLogin() { doAuth('login'); }
function doRegister() { doAuth('register'); }

// ── WebSocket ───────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'Auth', token }));
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleServerMsg(msg);
  };

  ws.onclose = () => {
    // Clean up voice state
    if (inVoiceChannel) cleanupVoice();
    // Reconnect after delay
    setTimeout(() => { if (token) connectWS(); }, 3000);
  };
}

function handleServerMsg(msg) {
  switch (msg.type) {
    case 'AuthResult':
      if (msg.ok) {
        currentUser = msg.username;
        userRoles = msg.roles || [];
        isAdmin = userRoles.includes('admin');
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'block';
        document.getElementById('display-user').textContent = currentUser;
        // Show admin gear if admin
        document.getElementById('admin-gear-btn').style.display = isAdmin ? '' : 'none';
      } else {
        document.getElementById('auth-error').textContent = msg.error || 'Auth failed';
        token = null;
        localStorage.removeItem('gathering_token');
        document.getElementById('auth-screen').style.display = 'flex';
      }
      break;

    case 'Message':
      appendMessage(msg);
      break;

    case 'History':
      if (msg.channel === currentChannel) {
        const el = document.getElementById('messages');
        el.innerHTML = '';
        msg.messages.forEach(m => appendMessage({ ...m, channel: msg.channel }));
      }
      break;

    case 'ChannelList':
      channels = msg.channels;
      renderChannels();
      break;

    case 'OnlineUsers':
      renderOnlineUsers(msg.users);
      break;

    case 'UserJoined':
      if (msg.channel === currentChannel) {
        appendSystem(`${msg.username} joined`);
      }
      break;

    case 'UserLeft':
      if (msg.channel === currentChannel) {
        appendSystem(`${msg.username} left`);
      }
      break;

    case 'UserTyping':
      if (msg.channel === currentChannel) {
        showTyping(msg.username);
      }
      break;

    case 'System':
      appendSystem(msg.content);
      break;

    case 'Error':
      appendSystem(`Error: ${msg.message}`);
      break;

    case 'VoiceMembers':
      voiceMembers = msg.users;
      renderVoiceMembers();
      msg.users.forEach(user => {
        if (user !== currentUser && !peerConnections[user]) {
          createPeerConnection(user, true);
        }
      });
      break;

    case 'VoiceUserJoined':
      if (!voiceMembers.includes(msg.username)) voiceMembers.push(msg.username);
      renderVoiceMembers();
      break;

    case 'VoiceUserLeft':
      voiceMembers = voiceMembers.filter(u => u !== msg.username);
      renderVoiceMembers();
      if (peerConnections[msg.username]) {
        peerConnections[msg.username].close();
        delete peerConnections[msg.username];
      }
      if (remoteAnalysers[msg.username]) {
        clearInterval(remoteAnalysers[msg.username].interval);
        delete remoteAnalysers[msg.username];
      }
      const audioEl = document.getElementById('audio-' + msg.username);
      if (audioEl) audioEl.remove();
      break;

    case 'VoiceSignal':
      handleVoiceSignal(msg.from_user, msg.signal_data);
      break;

    case 'TopicList':
      if (msg.channel === currentChannel) {
        topicsList = msg.topics;
        renderTopicList(topicsList);
      }
      break;

    case 'TopicDetail':
      if (msg.topic.id === currentTopicId) {
        renderThread(msg.topic, msg.replies);
      }
      break;

    case 'TopicCreated':
      if (msg.topic.channel === currentChannel) {
        topicsList.unshift(msg.topic);
        if (currentView === 'topics') renderTopicList(topicsList);
      }
      break;

    case 'TopicReplyAdded':
      if (msg.topic_id === currentTopicId && currentView === 'thread') {
        appendTopicReply(msg.reply);
      }
      // Update reply count in topic list
      { const t = topicsList.find(t => t.id === msg.topic_id);
        if (t) { t.reply_count++; t.last_activity = msg.reply.created_at; } }
      break;

    case 'TopicPinned':
      if (msg.channel === currentChannel) {
        const tp = topicsList.find(t => t.id === msg.topic_id);
        if (tp) tp.pinned = msg.pinned;
        topicsList.sort((a, b) => (b.pinned - a.pinned) || (new Date(b.last_activity) - new Date(a.last_activity)));
        if (currentView === 'topics') renderTopicList(topicsList);
        if (currentTopicId === msg.topic_id) {
          currentTopicPinned = msg.pinned;
          document.getElementById('thread-pin-btn').textContent = msg.pinned ? 'Unpin' : 'Pin';
        }
      }
      break;

    // ── Edit/Delete broadcasts ──
    case 'MessageEdited': {
      const msgEl = document.querySelector(`.msg[data-msg-id="${msg.id}"]`);
      if (msgEl) {
        const bodyEl = msgEl.querySelector('.body');
        if (bodyEl) bodyEl.innerHTML = renderRichContent(msg.content);
        msgEl.setAttribute('data-content', msg.content);
        // Add/update edited indicator
        let editedSpan = msgEl.querySelector('.edited');
        if (!editedSpan) {
          editedSpan = document.createElement('span');
          editedSpan.className = 'edited';
          msgEl.querySelector('.meta').appendChild(editedSpan);
        }
        editedSpan.textContent = '(edited)';
      }
      break;
    }

    case 'MessageDeleted': {
      const delEl = document.querySelector(`.msg[data-msg-id="${msg.id}"]`);
      if (delEl) delEl.remove();
      break;
    }

    case 'TopicEdited':
      if (msg.channel === currentChannel) {
        const t = topicsList.find(t => t.id === msg.topic_id);
        if (t) {
          if (msg.title) t.title = msg.title;
          if (currentView === 'topics') renderTopicList(topicsList);
        }
        if (currentTopicId === msg.topic_id && currentView === 'thread') {
          // Re-fetch topic to show updates
          ws.send(JSON.stringify({ type: 'GetTopic', topic_id: msg.topic_id }));
        }
      }
      break;

    case 'TopicDeleted':
      if (msg.channel === currentChannel) {
        topicsList = topicsList.filter(t => t.id !== msg.topic_id);
        if (currentView === 'topics') renderTopicList(topicsList);
        if (currentTopicId === msg.topic_id) {
          currentTopicId = null;
          switchView('topics');
        }
      }
      break;

    case 'TopicReplyEdited':
      if (msg.topic_id === currentTopicId && currentView === 'thread') {
        const replyEl = document.querySelector(`.msg[data-reply-id="${msg.reply_id}"]`);
        if (replyEl) {
          const bodyEl = replyEl.querySelector('.body');
          if (bodyEl) bodyEl.innerHTML = renderRichContent(msg.content);
          let editedSpan = replyEl.querySelector('.edited');
          if (!editedSpan) {
            editedSpan = document.createElement('span');
            editedSpan.className = 'edited';
            replyEl.querySelector('.meta').appendChild(editedSpan);
          }
          editedSpan.textContent = '(edited)';
        }
      }
      break;

    case 'TopicReplyDeleted':
      if (msg.topic_id === currentTopicId && currentView === 'thread') {
        const delReplyEl = document.querySelector(`.msg[data-reply-id="${msg.reply_id}"]`);
        if (delReplyEl) delReplyEl.remove();
      }
      break;

    case 'ChannelDeleted':
      channels = channels.filter(c => c.name !== msg.channel);
      renderChannels();
      if (currentChannel === msg.channel) {
        switchChannel('general');
      }
      break;

    // ── Admin responses ──
    case 'Settings':
      if (typeof renderAdminSettings === 'function') renderAdminSettings(msg.settings);
      break;

    case 'InviteCreated':
      if (typeof onInviteCreated === 'function') onInviteCreated(msg.code);
      break;

    case 'InviteList':
      if (typeof renderAdminInvites === 'function') renderAdminInvites(msg.invites);
      break;

    case 'RoleList':
      if (typeof renderAdminRoles === 'function') renderAdminRoles(msg.roles);
      break;

    case 'UserRoles':
      if (typeof onUserRolesResponse === 'function') onUserRolesResponse(msg.username, msg.roles);
      break;
  }
}

// ── Rich content rendering ──────────────────────────────────────────

function renderRichContent(raw) {
  let text = escapeHtml(raw);

  // Block-level LaTeX $$...$$ (before code blocks)
  text = text.replace(/\$\$([\s\S]*?)\$\$/g, (_, tex) => {
    try {
      if (typeof katex !== 'undefined') {
        return '<div class="katex-display">' + katex.renderToString(unescapeHtml(tex), { displayMode: true, throwOnError: false }) + '</div>';
      }
    } catch(e) {}
    return '$$' + tex + '$$';
  });

  // Code blocks with optional language: ```lang\n...\n```
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const highlighted = lang ? highlightSyntax(unescapeHtml(code), lang) : escapeHtml(unescapeHtml(code));
    const langTag = lang ? `<span class="lang-tag">${lang}</span>` : '';
    return `<pre>${langTag}<code>${highlighted}</code></pre>`;
  });

  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Inline LaTeX $...$
  text = text.replace(/\$([^\$\n]+?)\$/g, (_, tex) => {
    try {
      if (typeof katex !== 'undefined') {
        return katex.renderToString(unescapeHtml(tex), { throwOnError: false });
      }
    } catch(e) {}
    return '$' + tex + '$';
  });

  // Bold, italic, strikethrough
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');

  // Links [text](url)
  text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Auto-link URLs (not already inside href or tags)
  text = text.replace(/(^|[^"=])(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>');

  // Blockquotes (lines starting with >)
  text = text.replace(/(^|\n)&gt; (.+)/g, '$1<blockquote>$2</blockquote>');
  // Merge adjacent blockquotes
  text = text.replace(/<\/blockquote>\n?<blockquote>/g, '\n');

  // Bullet lists (lines starting with - )
  text = text.replace(/((?:^|\n)- .+(?:\n- .+)*)/g, (match) => {
    const items = match.trim().split('\n').map(line =>
      '<li>' + line.replace(/^- /, '') + '</li>'
    ).join('');
    return '<ul>' + items + '</ul>';
  });

  // Newlines to <br> (but not inside pre/blockquote)
  text = text.replace(/\n/g, '<br>');

  return text;
}

function highlightSyntax(code, lang) {
  const keywords = {
    js: new Set(['const','let','var','function','return','if','else','for','while','class','import','export','from','async','await','new','this','try','catch','throw','switch','case','break','default','typeof','instanceof','in','of','true','false','null','undefined','void']),
    ts: new Set(['const','let','var','function','return','if','else','for','while','class','import','export','from','async','await','new','this','try','catch','throw','switch','case','break','default','typeof','instanceof','in','of','true','false','null','undefined','void','type','interface','enum','implements','extends','readonly','as','is']),
    rust: new Set(['fn','let','mut','pub','struct','enum','impl','use','mod','self','Self','crate','super','trait','where','async','await','move','return','if','else','for','while','loop','match','break','continue','true','false','Some','None','Ok','Err','type','const','static','unsafe','extern','ref','as','in']),
    python: new Set(['def','class','import','from','return','if','elif','else','for','while','try','except','finally','with','as','in','is','not','and','or','True','False','None','self','lambda','yield','raise','pass','break','continue','global','nonlocal','assert','del']),
    go: new Set(['func','package','import','return','if','else','for','range','switch','case','default','var','const','type','struct','interface','map','chan','go','defer','select','break','continue','true','false','nil','make','len','append','cap']),
    sql: new Set(['select','from','where','insert','into','values','update','set','delete','create','table','alter','drop','index','join','left','right','inner','outer','on','and','or','not','null','is','in','like','order','by','group','having','limit','offset','as','distinct','count','sum','avg','min','max','if','exists','primary','key','foreign','references','default','text','integer','real','blob']),
    sh: new Set(['if','then','else','fi','for','do','done','while','case','esac','function','return','exit','echo','export','source','cd','ls','rm','cp','mv','mkdir','grep','sed','awk','cat','chmod','chown','sudo','apt','yum','brew','npm','cargo','git']),
    html: new Set(['div','span','input','button','form','table','body','head','html','script','style','link','meta','title','class','id','src','href','type','name','value','onclick','onchange']),
    css: new Set(['color','background','border','margin','padding','display','flex','grid','position','width','height','font','text','align','justify','content','items','none','solid','auto','inherit','relative','absolute','fixed','block','inline']),
  };
  keywords.javascript = keywords.js;
  keywords.typescript = keywords.ts;
  keywords.rs = keywords.rust;
  keywords.py = keywords.python;
  keywords.bash = keywords.sh;

  const langNorm = lang.toLowerCase();
  const kwSet = keywords[langNorm];
  const isSql = (langNorm === 'sql');

  const hashCommentLangs = new Set(['python','py','sh','bash','ruby','rb','perl','pl','yaml','yml','toml','r']);
  const slashCommentLangs = new Set(['js','javascript','ts','typescript','rust','rs','go','java','c','cpp','cs','css','sql']);
  const useHash = hashCommentLangs.has(langNorm);
  const useSlash = slashCommentLangs.has(langNorm) || !langNorm;

  const parts = [];
  if (useSlash) { parts.push('\/\/.*$'); parts.push('\/\\*[\\s\\S]*?\\*\/'); }
  if (useHash) { parts.push('#.*$'); }
  parts.push('"(?:[^"\\\\]|\\\\.)*"');
  parts.push("'(?:[^'\\\\]|\\\\.)*'");
  parts.push('`(?:[^`\\\\]|\\\\.)*`');
  parts.push('\\b\\d+\\.?\\d*(?:e[+-]?\\d+)?\\b');
  parts.push('[a-zA-Z_]\\w*');
  parts.push('[\\s\\S]');
  const tokenRe = new RegExp(parts.join('|'), 'gm');

  let result = '';
  let m;
  while ((m = tokenRe.exec(code)) !== null) {
    const tok = m[0];
    const esc = escapeHtml(tok);
    if ((useSlash && (tok.startsWith('//') || tok.startsWith('/*'))) || (useHash && tok.startsWith('#'))) {
      result += `<span class="cm">${esc}</span>`;
    } else if ((tok.startsWith('"') && tok.endsWith('"')) || (tok.startsWith("'") && tok.endsWith("'")) || (tok.startsWith('`') && tok.endsWith('`'))) {
      result += `<span class="str">${esc}</span>`;
    } else if (/^\d/.test(tok)) {
      result += `<span class="num">${esc}</span>`;
    } else if (kwSet && /^[a-zA-Z_]/.test(tok)) {
      const lookup = isSql ? tok.toLowerCase() : tok;
      if (kwSet.has(lookup)) {
        result += `<span class="kw">${esc}</span>`;
      } else {
        result += esc;
      }
    } else {
      result += esc;
    }
  }
  return result;
}

function unescapeHtml(s) {
  const el = document.createElement('textarea');
  el.innerHTML = s;
  return el.value;
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function isImageMime(mime) {
  return /^image\/(jpeg|png|gif|webp|svg\+xml)$/.test(mime);
}

function isAudioMime(mime) {
  return /^audio\//.test(mime);
}

function isVideoMime(mime) {
  return /^video\//.test(mime);
}

// ── Rendering ───────────────────────────────────────────────────────
function appendMessage(msg) {
  if (msg.channel && msg.channel !== currentChannel) return;

  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg';
  div.setAttribute('data-msg-id', msg.id);
  div.setAttribute('data-author', msg.author);
  div.setAttribute('data-content', msg.content);

  const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  let ttlHtml = '';
  if (msg.expires_at) {
    const exp = new Date(msg.expires_at);
    const remaining = Math.max(0, Math.round((exp - Date.now()) / 1000));
    if (remaining < 60) ttlHtml = `<span class="ttl">[${remaining}s]</span>`;
    else if (remaining < 3600) ttlHtml = `<span class="ttl">[${Math.round(remaining/60)}m]</span>`;
    else if (remaining < 86400) ttlHtml = `<span class="ttl">[${Math.round(remaining/3600)}h]</span>`;
    else ttlHtml = `<span class="ttl">[${Math.round(remaining/86400)}d]</span>`;
  }

  let editedHtml = '';
  if (msg.edited_at) {
    editedHtml = '<span class="edited">(edited)</span>';
  }

  const content = renderRichContent(msg.content);

  // Build attachments HTML
  let attachHtml = '';
  if (msg.attachments && msg.attachments.length > 0) {
    attachHtml = '<div class="attachments">';
    for (const att of msg.attachments) {
      if (isImageMime(att.mime_type)) {
        attachHtml += `<a href="${escapeHtml(att.url)}" target="_blank"><img class="attachment-img" src="${escapeHtml(att.url)}" alt="${escapeHtml(att.filename)}" loading="lazy"></a>`;
      } else if (isAudioMime(att.mime_type)) {
        attachHtml += `<div class="attachment-audio"><div class="file-name">${escapeHtml(att.filename)} <span class="file-size">(${formatFileSize(att.size)})</span></div><audio controls preload="metadata" src="${escapeHtml(att.url)}"></audio></div>`;
      } else if (isVideoMime(att.mime_type)) {
        attachHtml += `<video controls preload="metadata" src="${escapeHtml(att.url)}" style="max-width:400px;max-height:300px;border-radius:4px;margin-top:0.3rem;"></video>`;
      } else {
        attachHtml += `<div class="attachment"><a href="${escapeHtml(att.url)}" download="${escapeHtml(att.filename)}">${escapeHtml(att.filename)}</a> <span class="file-size">${formatFileSize(att.size)}</span></div>`;
      }
    }
    attachHtml += '</div>';
  }

  // Action buttons
  let actionsHtml = '';
  const isOwn = msg.author === currentUser;
  if (isOwn || isAdmin) {
    actionsHtml = '<div class="msg-actions">';
    if (isOwn) actionsHtml += `<button onclick="startEditMessage('${msg.id}')">edit</button>`;
    actionsHtml += `<button class="del-btn" onclick="deleteMessage('${msg.id}')">del</button>`;
    actionsHtml += '</div>';
  }

  div.innerHTML = `${actionsHtml}
    <div class="meta">
      <span class="author">${escapeHtml(msg.author)}</span>
      <span class="time">${time}</span>${ttlHtml}${editedHtml}
    </div>
    <div class="body">${content}</div>${attachHtml}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

// ── File upload ─────────────────────────────────────────────────────

async function handleFileSelect(event) {
  const files = event.target.files;
  if (!files.length) return;

  const progress = document.getElementById('upload-progress');

  for (const file of files) {
    if (file.size > 50 * 1024 * 1024) {
      progress.textContent = `${file.name}: too large (max 50MB)`;
      continue;
    }

    progress.textContent = `Uploading ${file.name}...`;

    const formData = new FormData();
    formData.append('file', file);
    formData.append('channel', currentChannel);

    try {
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData,
      });
      const data = await res.json();
      if (data.ok && data.file) {
        pendingAttachments.push(data.file);
        renderPendingFiles();
        progress.textContent = '';
      } else {
        progress.textContent = `Failed: ${data.error || 'Unknown error'}`;
      }
    } catch (e) {
      progress.textContent = `Upload failed: ${e.message}`;
    }
  }

  // Reset file input
  event.target.value = '';
}

function renderPendingFiles() {
  const el = document.getElementById('pending-files');
  el.innerHTML = pendingAttachments.map((f, i) =>
    `<div class="pending-file">${escapeHtml(f.filename)} <span class="file-size">(${formatFileSize(f.size)})</span><span class="remove-file" onclick="removePendingFile(${i})">&times;</span></div>`
  ).join('');
}

function removePendingFile(index) {
  pendingAttachments.splice(index, 1);
  renderPendingFiles();
}

function switchChannel(name) {
  currentChannel = name;
  currentTopicId = null;
  topicsList = [];
  document.getElementById('chat-channel-name').textContent = `#${name}`;
  document.getElementById('messages').innerHTML = '';
  renderChannels();
  switchView('chat');
  ws.send(JSON.stringify({ type: 'History', channel: name, limit: 100 }));
}

function joinChannel() {
  const input = document.getElementById('new-channel');
  let name = input.value.trim().replace(/^#/, '').replace(/[^a-zA-Z0-9_-]/g, '');
  if (!name) return;
  input.value = '';
  ws.send(JSON.stringify({ type: 'Join', channel: name }));
  currentChannel = name;
  document.getElementById('chat-channel-name').textContent = `#${name}`;
  document.getElementById('messages').innerHTML = '';
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();

  // If editing, send edit instead
  if (editingMessageId) {
    if (!content) return;
    ws.send(JSON.stringify({ type: 'EditMessage', message_id: editingMessageId, content }));
    cancelEdit();
    return;
  }

  // Allow sending if there's content or pending attachments
  if (!content && pendingAttachments.length === 0) return;

  const ttlSelect = document.getElementById('ttl-select');
  const ttl = ttlSelect.value ? parseInt(ttlSelect.value) : null;

  const msg = {
    type: 'Send',
    channel: currentChannel,
    content: content || '',
    ttl_secs: ttl,
  };

  if (pendingAttachments.length > 0) {
    msg.attachments = pendingAttachments.map(f => f.id);
  }

  ws.send(JSON.stringify(msg));
  input.value = '';
  input.style.height = 'auto';
  pendingAttachments = [];
  renderPendingFiles();
}

let lastTypingSent = 0;
function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
    return;
  }
  // Escape cancels edit
  if (e.key === 'Escape' && editingMessageId) {
    cancelEdit();
    return;
  }
  // Up arrow to edit last own message
  if (e.key === 'ArrowUp' && !editingMessageId) {
    const input = document.getElementById('msg-input');
    if (input.value === '') {
      const msgs = document.querySelectorAll(`.msg[data-author="${currentUser}"]`);
      if (msgs.length > 0) {
        const lastMsg = msgs[msgs.length - 1];
        const msgId = lastMsg.getAttribute('data-msg-id');
        if (msgId) startEditMessage(msgId);
      }
      e.preventDefault();
      return;
    }
  }
  // Tab inserts a tab character instead of moving focus
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    ta.value = ta.value.substring(0, start) + '  ' + ta.value.substring(end);
    ta.selectionStart = ta.selectionEnd = start + 2;
    return;
  }
  // Auto-resize textarea
  e.target.style.height = 'auto';
  e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';

  // Typing indicator (throttled)
  const now = Date.now();
  if (now - lastTypingSent > 2000) {
    lastTypingSent = now;
    ws.send(JSON.stringify({ type: 'Typing', channel: currentChannel }));
  }
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Voice state ─────────────────────────────────────────────────────
let inVoiceChannel = false;
let voiceChannel = '';
let voiceMembers = [];
let peerConnections = {};
let localStream = null;
let isMuted = false;
let isDeafened = false;
let localAnalyser = null;
let localAnalyserInterval = null;
let remoteAnalysers = {};
const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

function joinVoice() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    appendSystem('Voice requires a secure connection (HTTPS). Connect via https:// or localhost.');
    return;
  }
  navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(stream => {
    localStream = stream;
    inVoiceChannel = true;
    voiceChannel = currentChannel;
    ws.send(JSON.stringify({ type: 'VoiceJoin', channel: currentChannel }));
    document.getElementById('voice-join-btn').style.display = 'none';
    document.getElementById('voice-leave-btn').style.display = '';
    document.getElementById('voice-controls').style.display = '';
    document.getElementById('voice-status').textContent = 'Connected to #' + currentChannel;
    startLocalSpeakingDetection();
  }).catch(err => {
    appendSystem('Microphone access denied: ' + err.message);
  });
}

function leaveVoice() {
  if (!inVoiceChannel) return;
  ws.send(JSON.stringify({ type: 'VoiceLeave', channel: voiceChannel }));
  cleanupVoice();
}

function cleanupVoice() {
  for (const user in peerConnections) {
    peerConnections[user].close();
    if (remoteAnalysers[user]) {
      clearInterval(remoteAnalysers[user].interval);
      delete remoteAnalysers[user];
    }
  }
  peerConnections = {};
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  if (localAnalyserInterval) { clearInterval(localAnalyserInterval); localAnalyserInterval = null; }
  localAnalyser = null;
  inVoiceChannel = false;
  voiceChannel = '';
  voiceMembers = [];
  isMuted = false;
  isDeafened = false;
  document.getElementById('voice-join-btn').style.display = '';
  document.getElementById('voice-leave-btn').style.display = 'none';
  document.getElementById('voice-controls').style.display = 'none';
  document.getElementById('voice-status').textContent = 'Not connected';
  document.getElementById('voice-members').innerHTML = '';
  document.getElementById('mute-btn').classList.remove('active');
  document.getElementById('mute-btn').textContent = 'Mute';
  document.getElementById('deafen-btn').classList.remove('active');
  document.getElementById('deafen-btn').textContent = 'Deafen';
  document.querySelectorAll('audio.voice-remote').forEach(el => el.remove());
}

function createPeerConnection(targetUser, isInitiator) {
  const pc = new RTCPeerConnection(rtcConfig);
  peerConnections[targetUser] = pc;

  if (localStream) {
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      ws.send(JSON.stringify({
        type: 'VoiceSignal',
        target_user: targetUser,
        signal_data: { type: 'ice-candidate', candidate: e.candidate }
      }));
    }
  };

  pc.ontrack = (e) => {
    let audio = document.getElementById('audio-' + targetUser);
    if (!audio) {
      audio = document.createElement('audio');
      audio.id = 'audio-' + targetUser;
      audio.className = 'voice-remote';
      audio.autoplay = true;
      document.body.appendChild(audio);
    }
    audio.srcObject = e.streams[0];
    if (isDeafened) audio.muted = true;
    startRemoteSpeakingDetection(targetUser, e.streams[0]);
  };

  if (isInitiator) {
    pc.createOffer().then(offer => {
      return pc.setLocalDescription(offer);
    }).then(() => {
      ws.send(JSON.stringify({
        type: 'VoiceSignal',
        target_user: targetUser,
        signal_data: { type: 'offer', sdp: pc.localDescription }
      }));
    });
  }

  return pc;
}

function handleVoiceSignal(fromUser, signalData) {
  if (signalData.type === 'offer') {
    const pc = createPeerConnection(fromUser, false);
    pc.setRemoteDescription(new RTCSessionDescription(signalData.sdp)).then(() => {
      return pc.createAnswer();
    }).then(answer => {
      return pc.setLocalDescription(answer);
    }).then(() => {
      ws.send(JSON.stringify({
        type: 'VoiceSignal',
        target_user: fromUser,
        signal_data: { type: 'answer', sdp: pc.localDescription }
      }));
    });
  } else if (signalData.type === 'answer') {
    if (peerConnections[fromUser]) {
      peerConnections[fromUser].setRemoteDescription(new RTCSessionDescription(signalData.sdp));
    }
  } else if (signalData.type === 'ice-candidate') {
    if (peerConnections[fromUser]) {
      peerConnections[fromUser].addIceCandidate(new RTCIceCandidate(signalData.candidate));
    }
  }
}

function renderVoiceMembers() {
  const el = document.getElementById('voice-members');
  el.innerHTML = voiceMembers.map(u =>
    `<div class="voice-member" id="voice-member-${u}">` +
    `<span class="voice-dot"></span>` +
    `<span class="voice-name">${escapeHtml(u)}</span></div>`
  ).join('');
}

function toggleMute() {
  isMuted = !isMuted;
  if (localStream) {
    localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  }
  const btn = document.getElementById('mute-btn');
  btn.classList.toggle('active', isMuted);
  btn.textContent = isMuted ? 'Unmute' : 'Mute';
  const myEl = document.getElementById('voice-member-' + currentUser);
  if (myEl) myEl.classList.toggle('muted', isMuted);
}

function toggleDeafen() {
  isDeafened = !isDeafened;
  document.querySelectorAll('audio.voice-remote').forEach(el => el.muted = isDeafened);
  const btn = document.getElementById('deafen-btn');
  btn.classList.toggle('active', isDeafened);
  btn.textContent = isDeafened ? 'Undeafen' : 'Deafen';
  if (isDeafened && !isMuted) toggleMute();
}

function startLocalSpeakingDetection() {
  try {
    const ctx = new AudioContext();
    const src = ctx.createMediaStreamSource(localStream);
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    localAnalyser = analyser;
    const data = new Uint8Array(analyser.frequencyBinCount);
    localAnalyserInterval = setInterval(() => {
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a, b) => a + b, 0) / data.length;
      const el = document.getElementById('voice-member-' + currentUser);
      if (el) el.classList.toggle('speaking', avg > 15 && !isMuted);
    }, 100);
  } catch(e) {}
}

function startRemoteSpeakingDetection(user, stream) {
  try {
    if (remoteAnalysers[user]) { clearInterval(remoteAnalysers[user].interval); }
    const ctx = new AudioContext();
    const src = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    const interval = setInterval(() => {
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a, b) => a + b, 0) / data.length;
      const el = document.getElementById('voice-member-' + user);
      if (el) el.classList.toggle('speaking', avg > 15);
    }, 100);
    remoteAnalysers[user] = { analyser, interval };
  } catch(e) {}
}

// ── Topics ──────────────────────────────────────────────────────────
let currentView = 'chat';
let currentTopicId = null;
let currentTopicPinned = false;
let currentTopicAuthor = '';
let topicsList = [];
let topicPendingAttachments = [];
let replyPendingAttachments = [];

function switchView(view) {
  currentView = view;
  document.getElementById('chat-view').style.display = (view === 'chat') ? 'flex' : 'none';
  document.getElementById('topics-view').style.display = (view === 'topics') ? 'flex' : 'none';
  document.getElementById('thread-view').style.display = (view === 'thread') ? 'flex' : 'none';
  document.getElementById('view-chat-btn').classList.toggle('active', view === 'chat');
  document.getElementById('view-topics-btn').classList.toggle('active', view !== 'chat');
  if (view === 'topics') {
    ws.send(JSON.stringify({ type: 'ListTopics', channel: currentChannel, limit: 50 }));
  }
}

function renderTopicList(topics) {
  const el = document.getElementById('topic-list');
  if (topics.length === 0) {
    el.innerHTML = '<div class="topic-empty">No topics yet. Create one below.</div>';
    return;
  }
  el.innerHTML = topics.map(t => {
    const time = new Date(t.created_at).toLocaleDateString();
    const lastAct = formatTimeAgo(t.last_activity);
    return `<div class="topic-item${t.pinned ? ' pinned' : ''}" onclick="openTopic('${escapeHtml(t.id)}')">
      <div class="topic-title">${t.pinned ? '<span class="topic-pin-icon">&#x1F4CC;</span>' : ''}${escapeHtml(t.title)}</div>
      <div class="topic-meta">by ${escapeHtml(t.author)} &middot; ${time}${t.expires_at ? ' ' + renderTtlBadge(t.expires_at) : ''}</div>
      <div class="topic-stats">${t.reply_count} ${t.reply_count === 1 ? 'reply' : 'replies'} &middot; last activity ${lastAct}</div>
    </div>`;
  }).join('');
}

function formatTimeAgo(isoStr) {
  const diff = Math.max(0, Math.round((Date.now() - new Date(isoStr).getTime()) / 1000));
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function openTopic(topicId) {
  currentTopicId = topicId;
  ws.send(JSON.stringify({ type: 'GetTopic', topic_id: topicId }));
  switchView('thread');
}

function backToTopics() {
  currentTopicId = null;
  switchView('topics');
}

function createTopic() {
  const titleEl = document.getElementById('new-topic-title');
  const bodyEl = document.getElementById('new-topic-body');
  const title = titleEl.value.trim();
  const body = bodyEl.value.trim();
  if (!title) return;
  const ttlVal = document.getElementById('topic-ttl-select').value;
  const msg = { type: 'CreateTopic', channel: currentChannel, title, body: body || '' };
  if (ttlVal) msg.ttl_secs = parseInt(ttlVal);
  if (topicPendingAttachments.length > 0) msg.attachments = topicPendingAttachments.map(f => f.id);
  ws.send(JSON.stringify(msg));
  titleEl.value = '';
  bodyEl.value = '';
  topicPendingAttachments = [];
  renderTopicPendingFiles();
}

function sendReply() {
  const input = document.getElementById('reply-input');
  const content = input.value.trim();
  if (!content && replyPendingAttachments.length === 0) return;
  if (!currentTopicId) return;
  const ttlVal = document.getElementById('reply-ttl-select').value;
  const msg = { type: 'TopicReply', topic_id: currentTopicId, content: content || '' };
  if (ttlVal) msg.ttl_secs = parseInt(ttlVal);
  if (replyPendingAttachments.length > 0) msg.attachments = replyPendingAttachments.map(f => f.id);
  ws.send(JSON.stringify(msg));
  input.value = '';
  input.style.height = 'auto';
  replyPendingAttachments = [];
  renderReplyPendingFiles();
}

function handleReplyKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendReply();
    return;
  }
  e.target.style.height = 'auto';
  e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
}

function renderThread(topic, replies) {
  document.getElementById('thread-title').textContent = topic.title;

  document.getElementById('thread-delete-btn').style.display = canEditTopic ? '' : 'none';

function appendTopicReply(reply) {
  const el = document.getElementById('thread-replies');
  const div = document.createElement('div');
  div.className = 'msg';
  div.setAttribute('data-reply-id', reply.id);
  div.setAttribute('data-author', reply.author);
  div.setAttribute('data-content', reply.content);
  const time = new Date(reply.created_at).toLocaleString();
  let ttlHtml = renderTtlBadge(reply.expires_at);
  let editedHtml = reply.edited_at ? '<span class="edited">(edited)</span>' : '';

  // Action buttons for replies
  let actionsHtml = '';
  const isOwn = reply.author === currentUser;
  if (isOwn || isAdmin) {
    actionsHtml = '<div class="msg-actions">';
    if (isOwn) actionsHtml += `<button onclick="startEditReply('${reply.id}')">edit</button>`;
    actionsHtml += `<button class="del-btn" onclick="deleteReply('${reply.id}')">del</button>`;
    actionsHtml += '</div>';
  }

  div.innerHTML = `${actionsHtml}<div class="meta"><span class="author">${escapeHtml(reply.author)}</span> <span class="time">${time}</span>${ttlHtml}${editedHtml}</div><div class="body">${renderRichContent(reply.content)}</div>${renderAttachmentsHtml(reply.attachments)}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function startEditTopic() {
  const bodyEl = document.getElementById('thread-body');
  const currentBody = bodyEl.getAttribute('data-topic-body') || '';
  const currentTitle = bodyEl.getAttribute('data-topic-title') || '';
  const titleEl = document.getElementById('thread-title');

  // Replace title with input
  titleEl.innerHTML = `<input type="text" id="edit-topic-title" value="${escapeHtml(currentTitle)}" style="width:100%;padding:0.3rem;background:var(--bg);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-family:inherit;font-size:1rem;font-weight:600;">`;

  // Replace body with textarea
  const metaHtml = bodyEl.querySelector('.meta').outerHTML;
  bodyEl.innerHTML = `${metaHtml}<textarea id="edit-topic-body" style="width:100%;min-height:80px;padding:0.4rem;background:var(--bg);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-family:inherit;font-size:0.85rem;resize:vertical;">${escapeHtml(currentBody)}</textarea>
  <div style="margin-top:0.4rem;display:flex;gap:0.3rem;">
    <button class="admin-btn-sm" onclick="saveEditTopic()">Save</button>
    <button class="admin-btn-sm danger" onclick="cancelEditTopic()">Cancel</button>
  </div>`;
}

function saveEditTopic() {
  const title = document.getElementById('edit-topic-title').value.trim();
  const body = document.getElementById('edit-topic-body').value;
  const msg = { type: 'EditTopic', topic_id: currentTopicId };
  if (title) msg.title = title;
  msg.body = body;
  ws.send(JSON.stringify(msg));
}

function cancelEditTopic() {
  // Re-fetch to restore
  ws.send(JSON.stringify({ type: 'GetTopic', topic_id: currentTopicId }));
}

function deleteCurrentTopic() {
  if (!currentTopicId) return;
  ws.send(JSON.stringify({ type: 'DeleteTopic', topic_id: currentTopicId }));
}

function startEditReply(replyId) {
  const replyEl = document.querySelector(`.msg[data-reply-id="${replyId}"]`);
  if (!replyEl) return;
  const content = replyEl.getAttribute('data-content');
  const bodyEl = replyEl.querySelector('.body');
  bodyEl.innerHTML = `<textarea id="edit-reply-textarea" style="width:100%;min-height:40px;padding:0.3rem;background:var(--bg);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-family:inherit;font-size:0.85rem;resize:vertical;">${escapeHtml(content)}</textarea>
  <div style="margin-top:0.3rem;display:flex;gap:0.3rem;">
    <button class="admin-btn-sm" onclick="saveEditReply('${replyId}')">Save</button>
    <button class="admin-btn-sm danger" onclick="cancelEditReply('${replyId}')">Cancel</button>
  </div>`;
}

function saveEditReply(replyId) {
  const textarea = document.getElementById('edit-reply-textarea');
  if (!textarea) return;
  ws.send(JSON.stringify({ type: 'EditTopicReply', reply_id: replyId, content: textarea.value }));
}

function cancelEditReply(replyId) {
  // Re-fetch topic to restore
  ws.send(JSON.stringify({ type: 'GetTopic', topic_id: currentTopicId }));
}

function deleteReply(replyId) {
  ws.send(JSON.stringify({ type: 'DeleteTopicReply', reply_id: replyId }));
}

function renderTtlBadge(expiresAt) {
  if (!expiresAt) return '';
  const exp = new Date(expiresAt);
  const remaining = Math.max(0, Math.round((exp - Date.now()) / 1000));
  if (remaining < 60) return `<span class="ttl">[${remaining}s]</span>`;
  if (remaining < 3600) return `<span class="ttl">[${Math.round(remaining/60)}m]</span>`;
  if (remaining < 86400) return `<span class="ttl">[${Math.round(remaining/3600)}h]</span>`;
  return `<span class="ttl">[${Math.round(remaining/86400)}d]</span>`;
}

function renderAttachmentsHtml(attachments) {
  if (!attachments || attachments.length === 0) return '';
  let html = '<div class="attachments">';
  for (const att of attachments) {
    if (isImageMime(att.mime_type)) {
      html += `<a href="${escapeHtml(att.url)}" target="_blank"><img class="attachment-img" src="${escapeHtml(att.url)}" alt="${escapeHtml(att.filename)}" loading="lazy"></a>`;
    } else if (isAudioMime(att.mime_type)) {
      html += `<div class="attachment-audio"><div class="file-name">${escapeHtml(att.filename)} <span class="file-size">(${formatFileSize(att.size)})</span></div><audio controls preload="metadata" src="${escapeHtml(att.url)}"></audio></div>`;
    } else if (isVideoMime(att.mime_type)) {
      html += `<video controls preload="metadata" src="${escapeHtml(att.url)}" style="max-width:400px;max-height:300px;border-radius:4px;margin-top:0.3rem;"></video>`;
    } else {
      html += `<div class="attachment"><a href="${escapeHtml(att.url)}" download="${escapeHtml(att.filename)}">${escapeHtml(att.filename)}</a> <span class="file-size">${formatFileSize(att.size)}</span></div>`;
    }
  }
  html += '</div>';
  return html;
}

async function handleTopicFileSelect(event) {
  await uploadFilesTo(event, topicPendingAttachments, 'topic-pending-files', 'topic-upload-progress');
}

async function handleReplyFileSelect(event) {
  await uploadFilesTo(event, replyPendingAttachments, 'reply-pending-files', 'reply-upload-progress');
}

async function uploadFilesTo(event, pendingList, pendingElId, progressElId) {
  const files = event.target.files;
  if (!files.length) return;
  const progress = document.getElementById(progressElId);
  for (const file of files) {
    if (file.size > 50 * 1024 * 1024) {
      progress.textContent = `${file.name}: too large (max 50MB)`;
      continue;
    }
    progress.textContent = `Uploading ${file.name}...`;
    const formData = new FormData();
    formData.append('file', file);
    formData.append('channel', currentChannel);
    try {
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData,
      });
      const data = await res.json();
      if (data.ok && data.file) {
        pendingList.push(data.file);
        renderPendingFilesFor(pendingList, pendingElId);
        progress.textContent = '';
      } else {
        progress.textContent = `Failed: ${data.error || 'Unknown error'}`;
      }
    } catch (e) {
      progress.textContent = `Upload failed: ${e.message}`;
    }
  }
  event.target.value = '';
}

function renderTopicPendingFiles() { renderPendingFilesFor(topicPendingAttachments, 'topic-pending-files'); }
function renderReplyPendingFiles() { renderPendingFilesFor(replyPendingAttachments, 'reply-pending-files'); }

function renderPendingFilesFor(list, elId) {
  const el = document.getElementById(elId);
  el.innerHTML = list.map((f, i) =>
    `<div class="pending-file">${escapeHtml(f.filename)} <span class="file-size">(${formatFileSize(f.size)})</span><span class="remove-file" onclick="removePendingFileFrom(${i},'${elId}')">&times;</span></div>`
  ).join('');
}

function removePendingFileFrom(index, elId) {
  if (elId === 'topic-pending-files') { topicPendingAttachments.splice(index, 1); renderTopicPendingFiles(); }
  else if (elId === 'reply-pending-files') { replyPendingAttachments.splice(index, 1); renderReplyPendingFiles(); }
}

function togglePinTopic() {
  if (!currentTopicId) return;
  ws.send(JSON.stringify({ type: 'PinTopic', topic_id: currentTopicId, pinned: !currentTopicPinned }));
}

// ── Admin Panel ─────────────────────────────────────────────────────
let adminSettings = {};
let adminInvites = [];
let adminRoles = [];
let lastCreatedInvite = null;

function openAdminPanel() {
  document.getElementById('admin-overlay').classList.add('active');
  switchAdminTab('settings');
  ws.send(JSON.stringify({ type: 'GetSettings' }));
}

function closeAdminPanel() {
  document.getElementById('admin-overlay').classList.remove('active');
}

function switchAdminTab(tab, btn) {
  // Update tab buttons
  document.querySelectorAll('.admin-tabs button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelector(`.admin-tabs button:nth-child(${tab === 'settings' ? 1 : tab === 'invites' ? 2 : 3})`).classList.add('active');

  const content = document.getElementById('admin-tab-content');
  if (tab === 'settings') {
    ws.send(JSON.stringify({ type: 'GetSettings' }));
    content.innerHTML = '<div style="color:var(--text2);font-size:0.8rem;">Loading settings...</div>';
  } else if (tab === 'invites') {
    ws.send(JSON.stringify({ type: 'ListInvites' }));
    content.innerHTML = '<div style="color:var(--text2);font-size:0.8rem;">Loading invites...</div>';
  } else if (tab === 'roles') {
    ws.send(JSON.stringify({ type: 'ListRoles' }));
    content.innerHTML = '<div style="color:var(--text2);font-size:0.8rem;">Loading roles...</div>';
  }
}

function renderAdminSettings(settings) {
  adminSettings = settings;
  const content = document.getElementById('admin-tab-content');
  content.innerHTML = `
    <div class="admin-field">
      <label>Registration Mode</label>
      <select onchange="updateSetting('registration_mode', this.value)">
        <option value="open" ${settings.registration_mode === 'open' ? 'selected' : ''}>Open</option>
        <option value="closed" ${settings.registration_mode === 'closed' ? 'selected' : ''}>Closed</option>
        <option value="invite" ${settings.registration_mode === 'invite' ? 'selected' : ''}>Invite Only</option>
      </select>
    </div>
    <div class="admin-field">
      <label>Channel Creation</label>
      <select onchange="updateSetting('channel_creation', this.value)">
        <option value="all" ${settings.channel_creation === 'all' ? 'selected' : ''}>All Users</option>
        <option value="admin" ${settings.channel_creation === 'admin' ? 'selected' : ''}>Admin Only</option>
      </select>
    </div>
    <div class="admin-field" style="border-top:1px solid var(--border);padding-top:1rem;margin-top:1rem;">
      <label>Delete Channel</label>
      <div style="display:flex;gap:0.3rem;">
        <input type="text" id="delete-channel-input" placeholder="channel name">
        <button class="admin-btn-sm danger" onclick="deleteChannel()">Delete</button>
      </div>
    </div>
  `;
}

function updateSetting(key, value) {
  ws.send(JSON.stringify({ type: 'UpdateSetting', key, value }));
}

function deleteChannel() {
  const name = document.getElementById('delete-channel-input').value.trim();
  if (!name) return;
  if (!confirm(`Delete channel #${name}? This will delete all messages, topics, and files in the channel.`)) return;
  ws.send(JSON.stringify({ type: 'DeleteChannel', channel: name }));
  document.getElementById('delete-channel-input').value = '';
}

function onInviteCreated(code) {
  lastCreatedInvite = code;
  // Refresh invite list
  ws.send(JSON.stringify({ type: 'ListInvites' }));
}

function renderAdminInvites(invites) {
  adminInvites = invites;
  const content = document.getElementById('admin-tab-content');
  let html = `<button class="admin-btn-sm" onclick="ws.send(JSON.stringify({type:'CreateInvite'}))">Generate Invite Code</button>`;

  if (lastCreatedInvite) {
    html += `<div class="invite-code-display" style="margin-top:0.5rem;">
      <code>${escapeHtml(lastCreatedInvite)}</code>
      <button onclick="navigator.clipboard.writeText('${lastCreatedInvite}');this.textContent='Copied!'">Copy</button>
    </div>`;
  }

  html += '<div style="margin-top:1rem;">';
  if (invites.length === 0) {
    html += '<div style="color:var(--text2);font-size:0.8rem;">No invite codes yet.</div>';
  } else {
    for (const inv of invites) {
      const status = inv.used_by ? `used by ${inv.used_by}` : 'unused';
      const statusClass = inv.used_by ? 'used' : 'unused';
      html += `<div class="invite-list-item">
        <code>${escapeHtml(inv.code)}</code>
        <span class="invite-status ${statusClass}">${status}</span>
      </div>`;
    }
  }
  html += '</div>';
  content.innerHTML = html;
}

function renderAdminRoles(roles) {
  adminRoles = roles;
  const content = document.getElementById('admin-tab-content');
  let html = '';

  for (const role of roles) {
    html += `<div class="role-item">
      <div class="role-item-header">
        <span class="role-item-name">${escapeHtml(role.name)}</span>
      </div>
      <div class="role-item-perms">${role.permissions.join(', ') || 'none'}</div>
    </div>`;
  }

  html += `<div style="border-top:1px solid var(--border);padding-top:1rem;margin-top:1rem;">
    <label style="font-size:0.75rem;color:var(--text2);display:block;margin-bottom:0.3rem;">Assign Role to User</label>
    <div class="admin-user-role">
      <input type="text" id="role-assign-user" placeholder="username">
      <select id="role-assign-role">
        ${roles.map(r => `<option value="${escapeHtml(r.name)}">${escapeHtml(r.name)}</option>`).join('')}
      </select>
      <button class="admin-btn-sm" onclick="assignRoleToUser()">Assign</button>
      <button class="admin-btn-sm danger" onclick="removeRoleFromUser()">Remove</button>
    </div>
  </div>`;

  content.innerHTML = html;
}

function assignRoleToUser() {
  const username = document.getElementById('role-assign-user').value.trim();
  const role = document.getElementById('role-assign-role').value;
  if (!username || !role) return;
  ws.send(JSON.stringify({ type: 'AssignRole', username, role_name: role }));
}

function removeRoleFromUser() {
  const username = document.getElementById('role-assign-user').value.trim();
  const role = document.getElementById('role-assign-role').value;
  if (!username || !role) return;
  ws.send(JSON.stringify({ type: 'RemoveRole', username, role_name: role }));
}

function onUserRolesResponse(username, roles) {
  appendSystem(`Roles for ${username}: ${roles.join(', ') || 'none'}`);
}

// ── Auto-connect if token exists ────────────────────────────────────
if (token) connectWS();
</script>
