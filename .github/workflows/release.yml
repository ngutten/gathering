name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-server:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: gathering-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: gathering-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: gathering-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: gathering-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: gathering-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz gathering
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/${{ matrix.target }}/release/gathering.exe -DestinationPath ${{ matrix.artifact }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  build-client:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: gathering-client-linux
          - os: macos-latest
            artifact: gathering-client-macos
          - os: windows-latest
            artifact: gathering-client-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: tauri-${{ matrix.os }}
          workspaces: gathering-client/src-tauri

      - name: Install Tauri dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri app
        working-directory: gathering-client
        run: cargo tauri build

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp gathering-client/src-tauri/target/release/bundle/deb/*.deb dist/ 2>/dev/null || true
          cp gathering-client/src-tauri/target/release/bundle/appimage/*.AppImage dist/ 2>/dev/null || true

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp -r gathering-client/src-tauri/target/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          Copy-Item gathering-client/src-tauri/target/release/bundle/msi/*.msi dist/ -ErrorAction SilentlyContinue
          Copy-Item gathering-client/src-tauri/target/release/bundle/nsis/*.exe dist/ -ErrorAction SilentlyContinue

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    needs: [build-server, build-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
